spring:
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DB:iot}
    driverClassName: org.postgresql.Driver
    username:  ${POSTGRESQL_USER:postgres}
    password: ${POSTGRESQL_PASSWORD:IoTPass1234}
    hikari:
      initialization-fail-timeout: -1  # <--- no fallar si DB no está lista
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect   # ESTE ES EL FIX
        temp:
          use_jdbc_metadata_defaults: false
    show-sql: false

server:
  port: ${ADMIN_SERVICE_PORT:8081}
