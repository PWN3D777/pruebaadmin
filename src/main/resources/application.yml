spring:
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DB:iot}
    driverClassName: org.postgresql.Driver
    username:  ${POSTGRESQL_USER:postgres}
    password: ${POSTGRESQL_PASSWORD:IoTPass1234}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
server:
  port: ${ADMIN_SERVICE_PORT:8081}